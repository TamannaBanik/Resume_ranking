# ============================================================================
# Code and reproducibility
# ============================================================================
github_repo: "https://github.com/TamannaBanik/Resume_ranking/"
# Required. Must be reachable. Private repos OK if you can grant organizer
# access at Stage 3 (the email to add will be communicated then).

sandbox_link: "https://huggingface.co/spaces/midnightfirefly/redrob-ranker"
# Required. A working hosted environment where the ranker can be run on a small
# candidate sample. See Section 10.5 of submission_spec.md for acceptable
# platforms (HuggingFace Spaces, Streamlit Cloud, Replit, Colab, Docker, Binder).

reproduce_command: "python rank.py --candidates ./dataset/candidates.jsonl --embeddings ./lance.db/ --model ./models/ettin-reranker-32m-v1/  --out ./team_ReRankers.csv"
# The single command that produces submission.csv from candidates.jsonl.
# Should run end-to-end within 5 minutes on CPU with 16GB RAM and no network.

# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "Local Ryzen 7 box"              # Or: "AWS EC2 c5.4xlarge", "Local Linux box", etc.
  cpu_cores: 2                                  # Number of CPU cores used
  ram_gb: 16                                    # Available RAM in GB
  python_version: "3.14.6"                      # python --version
  os: "Linux arch 7.0.11-arch1-1"                     # Or "Ubuntu 22.04 LTS", etc.
  uses_gpu_for_inference: false                 # Must be false — see compute constraints
  has_network_during_ranking: false             # Must be false — no API calls during ranking
  pre_computation_required: true                # true if you pre-compute embeddings or train models offline
  pre_computation_time_minutes: 30              # Approximate, if applicable

# ============================================================================
# AI tools declaration
# ============================================================================
# Transparency only — declared use is NOT penalized. Be honest. Stage 5 interview
# may verify these declarations against your code; declarations that contradict
# your code or your interview are flagged.
ai_tools_used:
  - "Gemini"        # e.g. for architecture discussion, code review

ai_usage_summary: |
  - "Used Gemini to generate the candidate search website for easy cross checking"

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Hybrid candidate ranking system that combines ML-based text ranking with structured
  profile analysis. Instead of relying only on keyword matching or embedding similarity,
  our solution evaluates multiple probable ground truths (including but not limited to career,
  skills, signals, location etc.) and does not solely take user controlled metrics at face value.
  We use a combination of  Machine Learning valuations (Embeddings and Cross Encoder Ranking)
  along with deterministic heuristic scoring to establish a tradeoff between pure skills
  and candidate practicality. Takes ~1 minute for 100k records on CPU.
  

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        # I have read submission_spec.md in full
  code_is_original_work: true       # My code is my team's original work (using AI as a tool is fine)
  no_collusion: true                # I have not coordinated my submission with other teams
  honeypot_check_done: false        # OPTIONAL — set true if you explicitly checked for honeypots in your ranking
  reproduction_tested: true         # I have tested that my reproduce_command runs end-to-end
